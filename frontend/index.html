<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lofi Music Player</title>
  <link rel="icon" type="image/png" href="/logo-app.ico" />
  <script type="text/javascript">
    // Load eel.js dynamically để Vite không quét và báo lỗi lúc build
    (function() {
      var script = document.createElement('script');
      script.src = '/eel.js';
      script.onload = function() {
        if (window.eel) {
          // Khai báo hàm xử lý status tải xuống
          window.downloadStatus = function(msg) {
            const event = new CustomEvent('eelDownloadStatus', { detail: msg });
            window.dispatchEvent(event);
          };
          // Expose hàm cho phía Python gọi
          eel.expose(window.downloadStatus, 'downloadStatus');
          console.log('[Eel] script loaded and exposed');
        }
      };
      document.head.appendChild(script);
    })();
  </script>
</head>

<body class="bg-gray-900 text-gray-100 font-sans">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
